name: Vagas PM – Busca automática

on:
  schedule:
    # 06:00 BRT (UTC-3) = 09:00 UTC — segunda a sábado
    - cron: "0 9 * * 1-6"
    # 18:00 BRT (UTC-3) = 21:00 UTC — segunda a sábado
    - cron: "0 21 * * 1-6"
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  search-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar vagas e regenerar site
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python search_and_generate.py

      - name: Commit e push das atualizações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vagas/ index.html
          git diff --cached --quiet || git commit -m "auto: vagas PM $(date +'%Y-%m-%d %H:%M UTC')"
          git push
