name: Vagas PM - automatic search

on:
  schedule:
    # Daily runs in BRT (UTC-3), kept away from minute 0 to avoid scheduler drops.
    # 06:17 BRT = 09:17 UTC
    - cron: "17 9 * * *"
    # 07:47 BRT = 10:47 UTC, fallback if the first run is delayed or dropped
    - cron: "47 10 * * *"
    # 18:23 BRT = 21:23 UTC
    - cron: "23 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vagas-pm-publish
  cancel-in-progress: false

jobs:
  search-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Search jobs and regenerate site
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: python search_and_generate.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vagas/*.md vagas/url_history.json index.html broken_links.json
          if git diff --cached --quiet; then
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "auto: vagas PM $(date -u +'%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing and retrying..."
            git pull --rebase origin main
          done
          git push origin HEAD:main
